<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="faintGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" rx="24" fill="#080a0f"/>

  <!-- Subtle grid pattern (PCB substrate) -->
  <g opacity="0.06" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="20" x2="200" y2="20"/><line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="60" x2="200" y2="60"/><line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="100" x2="200" y2="100"/><line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="140" x2="200" y2="140"/><line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="0" y1="180" x2="200" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
  </g>

  <!-- Circuit traces radiating from neon mu -->
  <g stroke="#22c55e" stroke-width="1.2" fill="none" opacity="0.35" filter="url(#faintGlow)">
    <!-- Left traces -->
    <path d="M 50 72 H 20 V 40 H 10"/>
    <path d="M 50 100 H 30 V 120 H 10"/>
    <path d="M 60 150 H 40 V 180 H 15"/>
    <!-- Right traces -->
    <path d="M 140 72 H 170 V 30 H 190"/>
    <path d="M 140 100 H 160 V 80 H 190"/>
    <path d="M 145 150 H 165 V 170 H 190"/>
    <!-- Top traces -->
    <path d="M 70 55 V 30 H 50 V 10"/>
    <path d="M 120 55 V 25 H 140 V 10"/>
    <!-- Bottom traces -->
    <path d="M 80 160 V 180 H 60 V 195"/>
    <path d="M 130 170 V 185 H 150 V 195"/>
  </g>

  <!-- Solder pad circles at trace endpoints -->
  <g fill="#22c55e" opacity="0.4">
    <circle cx="10" cy="40" r="3"/><circle cx="10" cy="120" r="3"/>
    <circle cx="15" cy="180" r="3"/><circle cx="190" cy="30" r="3"/>
    <circle cx="190" cy="80" r="3"/><circle cx="190" cy="170" r="3"/>
    <circle cx="50" cy="10" r="3"/><circle cx="140" cy="10" r="3"/>
    <circle cx="60" cy="195" r="3"/><circle cx="150" cy="195" r="3"/>
  </g>

  <!-- Via holes (filled circles on traces) -->
  <g fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3">
    <circle cx="30" cy="100" r="4"/><circle cx="160" cy="80" r="4"/>
    <circle cx="40" cy="180" r="4"/><circle cx="165" cy="170" r="4"/>
  </g>

  <!-- Neon μ - built from thick glowing strokes -->
  <g filter="url(#neonGlow)" stroke="url(#neonGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left leg: down, curve bottom, up -->
    <path d="M 60 55 V 130 Q 60 148 78 148 Q 96 148 96 130"/>
    <!-- Right leg: down from shared curve -->
    <path d="M 96 130 V 55"/>
    <!-- Right extension + descender tail -->
    <path d="M 96 55 H 110 V 130 Q 110 148 128 148 Q 140 148 140 135 V 130"/>
    <!-- Descender -->
    <path d="M 140 130 V 165"/>
  </g>

  <!-- Bright center highlights on the neon tubes -->
  <g stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3">
    <path d="M 60 65 V 120"/>
    <path d="M 96 65 V 120"/>
    <path d="M 110 65 V 120"/>
    <path d="M 140 135 V 160"/>
  </g>
</svg>
