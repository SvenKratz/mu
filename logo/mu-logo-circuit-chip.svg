<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="dieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="muGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Package body -->
  <rect width="200" height="200" rx="8" fill="#1a1a2e"/>

  <!-- IC pins - top -->
  <g fill="#b8b8b8">
    <rect x="36" y="2" width="8" height="18" rx="1"/>
    <rect x="56" y="2" width="8" height="18" rx="1"/>
    <rect x="76" y="2" width="8" height="18" rx="1"/>
    <rect x="96" y="2" width="8" height="18" rx="1"/>
    <rect x="116" y="2" width="8" height="18" rx="1"/>
    <rect x="136" y="2" width="8" height="18" rx="1"/>
    <rect x="156" y="2" width="8" height="18" rx="1"/>
  </g>
  <!-- IC pins - bottom -->
  <g fill="#b8b8b8">
    <rect x="36" y="180" width="8" height="18" rx="1"/>
    <rect x="56" y="180" width="8" height="18" rx="1"/>
    <rect x="76" y="180" width="8" height="18" rx="1"/>
    <rect x="96" y="180" width="8" height="18" rx="1"/>
    <rect x="116" y="180" width="8" height="18" rx="1"/>
    <rect x="136" y="180" width="8" height="18" rx="1"/>
    <rect x="156" y="180" width="8" height="18" rx="1"/>
  </g>
  <!-- IC pins - left -->
  <g fill="#b8b8b8">
    <rect x="2" y="36" width="18" height="8" rx="1"/>
    <rect x="2" y="56" width="18" height="8" rx="1"/>
    <rect x="2" y="76" width="18" height="8" rx="1"/>
    <rect x="2" y="96" width="18" height="8" rx="1"/>
    <rect x="2" y="116" width="18" height="8" rx="1"/>
    <rect x="2" y="136" width="18" height="8" rx="1"/>
    <rect x="2" y="156" width="18" height="8" rx="1"/>
  </g>
  <!-- IC pins - right -->
  <g fill="#b8b8b8">
    <rect x="180" y="36" width="18" height="8" rx="1"/>
    <rect x="180" y="56" width="18" height="8" rx="1"/>
    <rect x="180" y="76" width="18" height="8" rx="1"/>
    <rect x="180" y="96" width="18" height="8" rx="1"/>
    <rect x="180" y="116" width="18" height="8" rx="1"/>
    <rect x="180" y="136" width="18" height="8" rx="1"/>
    <rect x="180" y="156" width="18" height="8" rx="1"/>
  </g>

  <!-- Die area -->
  <rect x="28" y="28" width="144" height="144" rx="4" fill="url(#dieGrad)" stroke="#334155" stroke-width="1"/>

  <!-- Pin-1 marker -->
  <circle cx="38" cy="38" r="4" fill="none" stroke="#4b5563" stroke-width="1"/>

  <!-- Bond wires (thin lines from die edge to pins) -->
  <g stroke="#d4a017" stroke-width="0.6" fill="none" opacity="0.5">
    <!-- Top -->
    <path d="M 40 28 Q 40 15 40 20"/><path d="M 60 28 Q 60 15 60 20"/>
    <path d="M 80 28 Q 80 15 80 20"/><path d="M 100 28 Q 100 15 100 20"/>
    <path d="M 120 28 Q 120 15 120 20"/><path d="M 140 28 Q 140 15 140 20"/>
    <path d="M 160 28 Q 160 15 160 20"/>
    <!-- Bottom -->
    <path d="M 40 172 Q 40 185 40 180"/><path d="M 60 172 Q 60 185 60 180"/>
    <path d="M 80 172 Q 80 185 80 180"/><path d="M 100 172 Q 100 185 100 180"/>
    <path d="M 120 172 Q 120 185 120 180"/><path d="M 140 172 Q 140 185 140 180"/>
    <path d="M 160 172 Q 160 185 160 180"/>
  </g>

  <!-- Die surface detail - faint etched blocks -->
  <g fill="none" stroke="#22c55e" stroke-width="0.3" opacity="0.12">
    <rect x="35" y="35" width="25" height="20" rx="1"/>
    <rect x="35" y="60" width="15" height="15" rx="1"/>
    <rect x="140" y="35" width="25" height="20" rx="1"/>
    <rect x="140" y="60" width="25" height="30" rx="1"/>
    <rect x="35" y="140" width="30" height="25" rx="1"/>
    <rect x="135" y="140" width="30" height="25" rx="1"/>
  </g>

  <!-- Central μ on die -->
  <text x="100" y="120" font-family="'Courier New', monospace" font-size="72" font-weight="bold"
        fill="url(#muGrad)" text-anchor="middle" filter="url(#innerGlow)">&#x03BC;</text>

  <!-- Chip model text -->
  <text x="100" y="160" font-family="'Courier New', monospace" font-size="8" letter-spacing="2"
        fill="#4b5563" text-anchor="middle">MU-001</text>
</svg>
