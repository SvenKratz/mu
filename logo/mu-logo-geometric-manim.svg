<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 3Blue1Brown / Manim inspired: dark background, clean math construction,
       characteristic blue (#58C4DD) with yellow accents -->
  <defs>
    <linearGradient id="manimBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#83D9EC"/>
      <stop offset="100%" stop-color="#58C4DD"/>
    </linearGradient>
    <linearGradient id="manimGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFF00"/>
      <stop offset="100%" stop-color="#F5C542"/>
    </linearGradient>
    <filter id="manimGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#FFFF00" opacity="0.5"/>
    </marker>
  </defs>

  <!-- 3b1b dark background -->
  <rect width="200" height="200" rx="0" fill="#1C1C1C"/>

  <!-- Coordinate grid (manim number plane style) -->
  <g stroke="#444444" stroke-width="0.4">
    <!-- Vertical grid lines -->
    <line x1="20" y1="10" x2="20" y2="190"/>
    <line x1="40" y1="10" x2="40" y2="190"/>
    <line x1="60" y1="10" x2="60" y2="190"/>
    <line x1="80" y1="10" x2="80" y2="190"/>
    <line x1="100" y1="10" x2="100" y2="190"/>
    <line x1="120" y1="10" x2="120" y2="190"/>
    <line x1="140" y1="10" x2="140" y2="190"/>
    <line x1="160" y1="10" x2="160" y2="190"/>
    <line x1="180" y1="10" x2="180" y2="190"/>
    <!-- Horizontal grid lines -->
    <line x1="10" y1="20" x2="190" y2="20"/>
    <line x1="10" y1="40" x2="190" y2="40"/>
    <line x1="10" y1="60" x2="190" y2="60"/>
    <line x1="10" y1="80" x2="190" y2="80"/>
    <line x1="10" y1="100" x2="190" y2="100"/>
    <line x1="10" y1="120" x2="190" y2="120"/>
    <line x1="10" y1="140" x2="190" y2="140"/>
    <line x1="10" y1="160" x2="190" y2="160"/>
    <line x1="10" y1="180" x2="190" y2="180"/>
  </g>

  <!-- Axes (slightly brighter) -->
  <line x1="100" y1="10" x2="100" y2="190" stroke="#666666" stroke-width="0.8"/>
  <line x1="10" y1="100" x2="190" y2="100" stroke="#666666" stroke-width="0.8"/>

  <!-- Construction: Bezier control points and handles (yellow, manim style) -->
  <g fill="none" stroke="#FFFF00" stroke-width="0.6" opacity="0.3" stroke-dasharray="3 3">
    <!-- Control lines for left leg curve -->
    <line x1="55" y1="145" x2="55" y2="155"/>
    <line x1="55" y1="155" x2="75" y2="155"/>
    <!-- Control lines for right curve -->
    <line x1="95" y1="155" x2="115" y2="155"/>
    <line x1="115" y1="155" x2="115" y2="145"/>
    <!-- Descender control -->
    <line x1="135" y1="135" x2="135" y2="165"/>
  </g>

  <!-- Control point dots (yellow) -->
  <g fill="#FFFF00" opacity="0.5">
    <circle cx="55" cy="155" r="2.5"/>
    <circle cx="75" cy="155" r="2.5"/>
    <circle cx="95" cy="155" r="2.5"/>
    <circle cx="115" cy="155" r="2.5"/>
    <circle cx="135" cy="165" r="2.5"/>
  </g>

  <!-- Anchor points (white, slightly larger) -->
  <g fill="none" stroke="white" stroke-width="1" opacity="0.4">
    <circle cx="55" cy="50" r="3"/>
    <circle cx="55" cy="145" r="3"/>
    <circle cx="85" cy="50" r="3"/>
    <circle cx="115" cy="50" r="3"/>
    <circle cx="115" cy="145" r="3"/>
    <circle cx="135" cy="135" r="3"/>
    <circle cx="150" cy="175" r="3"/>
  </g>

  <!-- The μ character drawn as mathematical Bezier curves (3b1b blue) -->
  <g fill="none" stroke="url(#manimBlue)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
     filter="url(#manimGlow)">
    <!-- Left vertical -->
    <line x1="55" y1="50" x2="55" y2="145"/>
    <!-- Bottom curve (left to right) -->
    <path d="M 55 145 Q 55 165 85 165 Q 115 165 115 145"/>
    <!-- Right vertical from curve top -->
    <line x1="115" y1="145" x2="115" y2="50"/>
    <!-- Descender -->
    <path d="M 115 135 H 135 V 165 Q 135 175 145 175 L 150 175"/>
  </g>

  <!-- Parametric t label (manim annotation style) -->
  <text x="170" y="25" font-family="'CMU Serif', Georgia, serif" font-size="12" font-style="italic"
        fill="#58C4DD" opacity="0.4">t = 1</text>

  <!-- Small equation annotation -->
  <text x="15" y="195" font-family="'CMU Serif', Georgia, serif" font-size="10" font-style="italic"
        fill="#888888" opacity="0.4">&#x03BC;(t) : [0,1] &#x2192; &#x211D;&#xB2;</text>

  <!-- Dimension arrows (yellow, subtle) -->
  <g stroke="#FFFF00" stroke-width="0.5" opacity="0.2" marker-end="url(#arrowhead)">
    <line x1="55" y1="40" x2="115" y2="40"/>
  </g>
  <text x="82" y="37" font-family="'CMU Serif', Georgia, serif" font-size="8" fill="#FFFF00" opacity="0.3" text-anchor="middle">w</text>
</svg>
